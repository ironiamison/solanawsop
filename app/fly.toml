# fly.toml app configuration file generated for solanawsop-socket on 2026-06-11T12:24:11+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solanawsop-socket'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.socket'

[env]
  ALLOWED_ORIGINS = 'https://solanawsop.com,https://www.solanawsop.com'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
