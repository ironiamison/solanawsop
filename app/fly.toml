# fly launch --name solanawsop-socket --region iad
app = "solanawsop-socket"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.socket"

[env]
  NODE_ENV = "production"
  ALLOWED_ORIGINS = "https://solanawsop.com,https://www.solanawsop.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    method = "GET"
    path = "/health"
